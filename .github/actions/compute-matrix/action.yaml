name: Compute Matrix
description: "Get assets to deploy"

inputs:
  environment:
    required: true
    description: "Environment to use (staging|production)"

runs:
  using: composite

  steps:
    - uses: actions/checkout@v5

    - name: Compute Matrix
      id: compute-matrix
      shell: bash
      run: |
        python scripts/script.py environment=${{ inputs.environment }}