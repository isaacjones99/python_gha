name: Dynamic Matrix Example

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute matrix
        id: compute
        run: python scripts/script.py

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests for service
        run: |
          echo "Testing service: ${{ matrix.service }}"
