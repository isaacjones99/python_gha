jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # You can use a script to generate a complex JSON string
          JSON='{"include":[{"project":"app1","node":14},{"project":"app1","node":16},{"project":"app2","node":16}]}'
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  test:
    needs: setup
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - run: npm test --project ${{ matrix.project }}