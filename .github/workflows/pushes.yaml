name: Dynamic Matrix Example

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute matrix
        id: compute
        run: python scripts/compute_matrix.py

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Test service
        run: |
         echo "Testing service: ${{ matrix.service }}"
