  staging:
    needs: [build]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      matrix:
        service: ${{ fromJson(needs.build.outputs.matrix) }}
    
    steps:
      - name: Matrix out
        run: |
         echo "Testing service: ${{ matrix.service }}"

  production:
    needs: [build, staging]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service: ${{ fromJson(needs.build.outputs.matrix) }}
    
    steps:
      - name: Matrix out
        run: |
         echo "Testing service: ${{ matrix.service }}"
