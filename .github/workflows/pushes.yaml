  find-objects:
    name: Find objects
    runs-on: ubuntu-latest
    outputs:
      objects-matrix: ${{ steps.run_composite.outputs.objects-matrix }}
    steps:
      - id: checkout
        uses: actions/checkout@v5
      - id: run_composite
        uses: ./.github/actions/compute-matrix

  objects-deploy:
    name: "Deploying ${{ matrix.connector }}"
    runs-on: ubuntu-latest
    needs: [find-objects]
    environment: staging
    strategy:
      matrix:
        connector: ${{ fromJson(needs.find-objects.outputs.objects-matrix) }}

    steps:
      - name: Matrix out
        run: |
          echo "${{ matrix.connector }}"


