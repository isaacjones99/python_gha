name: Dynamic Matrix Example

on: push

jobs:
  staging_build:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute matrix
        id: compute
        run: python scripts/script.py

  staging_deploy:
    needs: [staging_build]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      matrix:
        service: ${{ fromJson(needs.staging_build.outputs.matrix) }}
    
    steps:
      - name: Matrix out
        run: |
         echo "Testing service: ${{ matrix.service }}"

  production_build:
    runs-on: ubuntu-latest
    needs: [staging_deploy]
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute matrix
        id: compute
        run: python scripts/script.py
    
  production_deploy:
    needs: [production_build]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service: ${{ fromJson(needs.production_build.outputs.matrix) }}

    steps:
      - name: Matrix out
        run: |
          echo "Testing service: ${{ matrix.service }}"

  connector_build_staging:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute matrix
        id: compute
        run: python scripts/script.py

  connector_deploy_staging:
    needs: [connector_build_staging]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      matrix:
        service: ${{ fromJson(needs.connector_build_staging.outputs.matrix) }}
    
    steps:
      - name: Matrix out
        run: |
         echo "Testing service: ${{ matrix.service }}"

  connector_build_production:
    needs: [connector_deploy_staging]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute matrix
        id: compute
        run: python scripts/script.py

  connector_deploy_production:
    needs: [connector_build_production]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service: ${{ fromJson(needs.connector_build_production.outputs.matrix) }}
    
    steps:
      - name: Matrix out
        run: |
         echo "Testing service: ${{ matrix.service }}"