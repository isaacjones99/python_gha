name: Dynamic Matrix Example

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute matrix
        id: compute
        run: python scripts/script.py

