name: Output something

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  output_something:
    runs-on: ubuntu-latest
    steps:
      - name: Write the summary.md
        id: write_report
        shell: bash
        run: |
          REPORT_FILE=$(mktemp -t summary.html.XXXXX)
          echo "REPORT_FILE=$REPORT_FILE" >> $GITHUB_ENV
          cat >> $REPORT_FILE << 'ENDOFREPORT'
          <h1>Headline</h1>
          <table style="border-collapse: collapse; border: 1px solid black;">
            <thead>
              <tr>
                <th colspan="3" style="border: 1px solid black;">Topics</th>
                <th colspan="3" style="border: 1px solid black;">Connectors</th>
              </tr>
              <tr>
                <th style="border: 1px solid black;">Adding ➕</th>
                <th style="border: 1px solid black;">Deleting 🗑️</th>
                <th style="border: 1px solid black;">Drifting </th>
                <th style="border: 1px solid black;">Adding ➕</th>
                <th style="border: 1px solid black;">Deleting 🗑️</th>
                <th style="border: 1px solid black;">Updating</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style="border: 1px solid black;">1</td>
                <td style="border: 1px solid black;">1</td>
                <td style="border: 1px solid black;">1</td>
                <td style="border: 1px solid black;">1</td>
                <td style="border: 1px solid black;">1</td>
                <td style="border: 1px solid black;">1</td>
              </tr>
            </tbody>
          </table>
          ENDOFREPORT
          
      - name: Write the comment body
        id: comment-body
        shell: bash
        run: |
          CONTENT=$(cat $REPORT_FILE)
          echo "REPORT_CONTENT<<ENDOFREPORT" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "ENDOFREPORT" >> $GITHUB_OUTPUT

      - name: Find previous report comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Headline

      - name: Create comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.comment-body.outputs.REPORT_CONTENT }}
          edit-mode: replace
          reactions: '+1'